services:
  - type: web
    name: smartsana-api
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: GROK_MODEL
        value: grok-2-latest
      - key: AI_BASE_URL
        value: ""
      - key: CLIENT_ORIGIN
        value: https://your-frontend.vercel.app,http://localhost:5000,http://localhost:3000
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
